[build]
  command = "npm ci && npm run dashboard:install && npm run dashboard:build"
  publish = "dashboard/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["lib/**"]

[functions."scheduled-square-sync"]
  schedule = "0 6 * * *"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
