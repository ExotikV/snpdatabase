name: daily-sync

# Scheduled sync runs on Netlify (see netlify.toml + dashboard/netlify/functions/daily-sync.mjs).
# This workflow is manual backup only — avoids double-running pull/SMS/match jobs.

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_ENVIRONMENT: ${{ secrets.SQUARE_ENVIRONMENT }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify required secrets are configured
        run: |
          missing=""
          for name in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY SQUARE_ACCESS_TOKEN SQUARE_ENVIRONMENT TWILIO_ACCOUNT_SID TWILIO_AUTH_TOKEN TWILIO_PHONE_NUMBER; do
            if [ -z "${!name}" ]; then
              missing="$missing $name"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty GitHub Actions secrets:$missing"
            exit 1
          fi

      - name: Run daily sync
        run: node daily-sync.js
