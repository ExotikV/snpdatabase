name: daily-sync

# TEST_MODE is currently true in send_reminders.js -- this workflow will only send SMS to the
# hardcoded test phone number until TEST_MODE is manually changed to false in the code.

on:
  schedule:
    # TEMPORARY TEST — scheduled for ~00:50 UTC on 2026-06-22. Revert to production after confirming:
    #   - cron: "0 2 * * *"   (10pm Eastern during EDT)
    # GitHub may start scheduled runs 5–15 minutes after the cron minute; must be pushed to default branch.
    - cron: "50 0 * * *"
    # Production (restore this, remove line above):
    # - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_ENVIRONMENT: ${{ secrets.SQUARE_ENVIRONMENT }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify required secrets are configured
        run: |
          missing=""
          for name in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY SQUARE_ACCESS_TOKEN SQUARE_ENVIRONMENT TWILIO_ACCOUNT_SID TWILIO_AUTH_TOKEN TWILIO_PHONE_NUMBER; do
            if [ -z "${!name}" ]; then
              missing="$missing $name"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty GitHub Actions secrets:$missing"
            echo "Add each name under Settings → Secrets and variables → Actions → Repository secrets (not Variables)."
            exit 1
          fi

      - name: Pull Square data into Supabase
        run: node pull.js

      - name: Send maintenance reminder SMS
        run: node send_reminders.js

      # send_reminders.js continues after individual SMS failures and exits 0 unless the script
      # crashes; match_conversions only skips if that step exits with a non-zero code.
      - name: Match booking conversions
        run: node match_conversions.js
